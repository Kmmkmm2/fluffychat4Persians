name: Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for the release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool_versions.yaml
          cache: true

      # vodozemac (the encryption library) is compiled from Rust source.
      - uses: dtolnay/rust-toolchain@stable

      - name: Restore signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/key.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEYSTORE_PASSWORD
          keyAlias=key
          storeFile=../key.jks
          EOF

      - run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      # NOTE: --split-per-abi cannot be used here. The project pins
      # ndk abiFilters in android/app/build.gradle.kts as a workaround for
      # flutter issue #162153, and Gradle rejects abiFilters and abi splits
      # being configured at the same time.
      - name: Build release APK
        run: flutter build apk --release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
