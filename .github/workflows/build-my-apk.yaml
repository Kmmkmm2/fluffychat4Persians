name: Build My APK

on:
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool_versions.yaml
          cache: true

      # vodozemac (the encryption library) is written in Rust and is
      # compiled from source during the Android build.
      - uses: dtolnay/rust-toolchain@stable

      - run: flutter pub get

      # Regenerates all launcher icons from assets/logo/img/*.png
      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-chat-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
